        categoryTabs.innerHTML = categories.map(cat => `
          <button class="tab-btn ${activeCategory === cat ? 'active' : ''}" onclick="selectCategory('${cat}')">
            ${cat}
          </button>
        `).join('');
      }

      // Render Age Filter tabs

        const ages = ['전체', '10대', '20대 초반', '20대 후반'];
        ageTabs.innerHTML = ages.map(age => `
          <button class="tab-btn ${activeAge === age ? 'active' : ''}" onclick="selectAge('${age}')">
            ${age}
          </button>
        `).join('');
      }

      window.selectCategory = function(cat) {
        activeCategory = cat;
        renderCategoryTabs();
        renderCards();
      };

      window.selectAge = function(age) {
        activeAge = age;
        renderAgeTabs();
        renderCards();
      };

      // Draw SVG Sparkline path dynamically
      function generateSparkline(history, color) {
        const pointsCount = history.length;
        const width = 190;
        const height = 30;
        
        const points = history.map((val, idx) => {
          const x = (idx / (pointsCount - 1)) * width;
          const y = height - (val / 100) * height;
          return `${idx === 0 ? 'M' : 'L'} ${x} ${y}`;
        }).join(' ');

        return `
          <svg width="100%" height="100%" viewBox="0 0 ${width} ${height}" style="overflow: visible;">
            <path d="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="${width}" cy="${height - (history[pointsCount-1]/100)*height}" r="3" fill="${color}" />
          </svg>
        `;
      }

      // Render Cards Grid
      function renderCards() {
        // Filter by Category and Age
        let filtered = TRENDING_DATA;
        
        if (activeCategory !== '전체') {
          filtered = filtered.filter(item => item.category === activeCategory);
        }
        
        if (activeAge !== '전체') {
          filtered = filtered.filter(item => item.ageGroups.includes(activeAge));
        }

        if (filtered.length === 0) {
          cardsContainer.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px;">
              해당 필터에 맞는 오늘의 트렌드 스티커가 없습니다. 🌸
            </div>
          `;
          return;
        }

        cardsContainer.innerHTML = filtered.map(item => {
          const sparklineColor = item.isUp ? '#ff8a7a' : '#8e8e8e';
          const history = item.history || [50, 52, 54, 52, 53, 55];
          const sparklineHtml = generateSparkline(history, sparklineColor);

          return `
            <div class="trend-card" onclick="openDetail('${item.id}')">
              <!-- Top details -->
              <div class="card-header">
                <span class="category-tag ${item.catClass}">${item.category}</span>
                <span class="rate-pill ${item.isUp ? '' : 'down'}">
                  ${item.isUp ? '▲' : '▼'} ${item.rate}
                </span>
              </div>
              
              <!-- Content body -->
              <div class="card-body">
                <div class="keyword-title">${item.label}</div>
                <img src="${item.image}" alt="${item.label}" class="thumbnail-photo" />
              </div>

              <!-- Sparkline Trend Chart -->
              <div class="card-sparkline">
                ${sparklineHtml}
              </div>
            </div>
          `;
        }).join('');
      }

      // Open Modal detail dialog
      window.openDetail = function(id) {
        const item = TRENDING_DATA.find(k => k.id === id);
        if (!item) return;

        dialogTitle.innerHTML = `✨ ${item.label} (${item.category})`;
        dialogBody.innerHTML = `
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div style="width: 100%; height: 160px; border-radius: 12px; background-image: url(${item.image}); background-size: cover; background-position: center; border: 1px solid #eef0f2;"></div>
            <div style="font-size: 11px; font-weight: 800; color: var(--pastel-peach); letter-spacing: 0.5px; text-transform: uppercase;">ABOUT THIS ITEM</div>
            <div style="color: var(--text-secondary); line-height: 1.6;">${item.details}</div>
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 600;">주 타겟 소비층: ${item.ageGroups.filter(g => g !== '전체').join(', ')}</div>
          </div>
        `;
        dialog.showModal();
      };

      // Set up dialog action listeners
      document.getElementById('dialog-close-btn').addEventListener('click', () => dialog.close());
      document.getElementById('dialog-confirm-btn').addEventListener('click', () => dialog.close());

      renderAgeTabs();
      renderCards();
